<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - PokeCloud</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-poke">Poke</span><span class="logo-cloud">Cloud</span>
      </a>
      <div class="nav-right">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <span class="user-name" id="userName">Loading...</span>
        </div>
        <button class="btn-logout" id="logoutBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
          </svg>
          Logout
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="dashboard">
    <div class="dashboard-header">
      <div class="welcome-section">
        <h1>Welcome, <span id="welcomeName">Trainer</span></h1>
        <p>Choose a game to start or continue your adventure</p>
      </div>
      <div class="quick-stats">
        <div class="quick-stat">
          <span class="qs-number" id="totalRoms">0</span>
          <span class="qs-label">Games</span>
        </div>
        <div class="quick-stat">
          <span class="qs-number" id="totalSaves">0</span>
          <span class="qs-label">Saves</span>
        </div>
      </div>
    </div>

    <!-- Games Grid -->
    <section class="games-section">
      <h2 class="section-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.25 6.087c0-.355.186-.676.401-.959.221-.29.349-.634.349-1.003 0-1.036-1.007-1.875-2.25-1.875s-2.25.84-2.25 1.875c0 .369.128.713.349 1.003.215.283.401.604.401.959v0a.64.64 0 01-.657.643 48.491 48.491 0 01-4.163-.3c-1.103-.178-2.13.658-2.13 1.772v0c0 .852.57 1.595 1.397 1.852a6.714 6.714 0 003.551.147c.344-.07.657.138.772.47.13.372.283.737.46 1.093.18.36.164.784-.044 1.14-.303.527-.76.94-1.28 1.217-.52.278-1.1.412-1.72.412h-1.5c-.62 0-1.2-.134-1.72-.412a3.068 3.068 0 01-1.28-1.217c-.208-.356-.224-.78-.044-1.14.177-.356.33-.72.46-1.093.115-.332.428-.54.772-.47a6.714 6.714 0 003.551-.147c.827-.257 1.397-1 1.397-1.852v0c0-1.114-1.027-1.95-2.13-1.772a48.491 48.491 0 01-4.163.3.64.64 0 01-.657-.643v0c0-.355.186-.676.401-.959.221-.29.349-.634.349-1.003 0-1.036-1.007-1.875-2.25-1.875S2.25 4.036 2.25 5.072c0 .369.128.713.349 1.003.215.283.401.604.401.959v0c0 .552.448 1 1 1h4.5c.552 0 1-.448 1-1v0z"/>
        </svg>
        Your Games
      </h2>
      <div class="games-grid" id="gamesGrid">
        <!-- Games will be loaded here -->
        <div class="loading-state">
          <div class="pokeball-spinner"></div>
          <p>Loading games...</p>
        </div>
      </div>
    </section>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m6 4.125l2.25 2.25m0 0l2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
        </svg>
      </div>
      <h3>No Games Found</h3>
      <p>Add Pokemon ROM files (.gba, .gb, .gbc, .nds) to the Roms folder to get started.</p>
    </div>
  </main>

  <!-- Save Game Modal -->
  <div class="modal-overlay" id="savesModal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Save Files</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Saves will be listed here -->
      </div>
      <div class="modal-footer">
        <button class="btn-modal-play" id="modalNewGame">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 4.5v15m7.5-7.5h-15"/>
          </svg>
          New Game
        </button>
      </div>
    </div>
  </div>

  <script src="/js/sanitize.js"></script>
  <script src="/js/games.js"></script>
</body>
</html>
