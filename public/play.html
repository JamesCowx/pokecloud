<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play - PokeCloud</title>
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/play.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top Bar -->
  <div id="topbar">
    <div class="topbar-left">
      <a href="/dashboard" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Dashboard
      </a>
      <div class="game-info">
        <span class="game-title" id="gameTitle">Loading...</span>
        <span class="game-platform" id="gamePlatform"></span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="volume-group">
        <button class="topbar-btn" id="muteBtn" title="Mute/Unmute">
          <svg id="volumeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/>
          </svg>
        </button>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
        <span class="volume-label" id="volumeLabel">100</span>
      </div>
      <button class="topbar-btn" id="saveGameBtn" title="Save Game (F5)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m.75 12l3 3m0 0l3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
        <span>Save</span><kbd>F5</kbd>
      </button>
      <button class="topbar-btn" id="loadSaveBtn" title="Load Save (F9)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <span>Load</span><kbd>F9</kbd>
      </button>
      <button class="topbar-btn" id="fullscreenBtn" title="Fullscreen (F11)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
        </svg>
        <span>Full</span><kbd>F11</kbd>
      </button>
    </div>
  </div>

  <!-- Emulator Display - matches EmulatorJS example structure -->
  <div id="display">
    <div id="game"></div>
  </div>

  <!-- Save Modal -->
  <div class="save-modal-overlay" id="saveModal" style="display: none;">
    <div class="save-modal">
      <div class="save-modal-header">
        <h3>Save Game</h3>
        <button class="save-modal-close" id="saveModalClose">&times;</button>
      </div>
      <div class="save-modal-body">
        <div class="save-option">
          <label for="saveName">Save Name</label>
          <input type="text" id="saveName" placeholder="e.g., Before Gym Battle" value="Save Slot 1">
        </div>
        <div class="save-options">
          <label class="checkbox-label">
            <input type="checkbox" id="saveSRAM" checked>
            <span>Save Battery (SRAM)</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="saveState" checked>
            <span>Save State</span>
          </label>
        </div>
      </div>
      <div class="save-modal-footer">
        <button class="btn-cancel" id="cancelSave">Cancel</button>
        <button class="btn-save-confirm" id="confirmSave">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
          </svg>
          Save to Cloud
        </button>
      </div>
    </div>
  </div>

  <!-- Load Modal -->
  <div class="save-modal-overlay" id="loadModal" style="display: none;">
    <div class="save-modal">
      <div class="save-modal-header">
        <h3>Load Save</h3>
        <button class="save-modal-close" id="loadModalClose">&times;</button>
      </div>
      <div class="save-modal-body" id="loadModalBody">
        <div class="loading-saves">
          <div class="pokeball-spinner"></div>
          <p>Loading saves...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast" style="display: none;">
    <span class="toast-icon"></span>
    <span class="toast-message"></span>
  </div>

  <script src="/js/sanitize.js"></script>
  <script src="/js/emulator.js"></script>
</body>
</html>
